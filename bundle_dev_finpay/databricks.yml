# This is a Databricks asset bundle definition for bundle_dev_finpay.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bundle_dev_finpay
  uuid: 9a743928-1091-48fe-8f18-40d49fc72a06

include:
  - resources/*.yml

sync:
  include:
    - dashboards/**
    - notebooks/**

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel
    path: .

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  landing_volume:
    default: /Volumes/fintech_finpay/default/vol_landing/
targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-6edb81cf-9194.cloud.databricks.com
    variables:
      catalog: fintech_finpay
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-6edb81cf-9194.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/jean.zelada06@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jean.zelada06@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: fintech_finpay
      schema: prod
    permissions:
      - user_name: jean.zelada06@gmail.com
        level: CAN_MANAGE
